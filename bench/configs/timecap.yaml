{
  "config_version": "benchmark_config_v1",
  "mode": "time_capped",
  "description": "Quick time-capped smoke benchmark across one serial and one parallel solver.",
  "build_dir": "Release",
  "binary": "./Release/main",
  "execution": {
    "kind": "scenario"
  },
  "solvers": [
    {
      "name": "LTMOA",
      "thread_counts": [1]
    },
    {
      "name": "SOPMOA_relaxed",
      "thread_counts": [1, 4]
    }
  ],
  "datasets": ["nyc_3obj"],
  "query_sets": ["nyc_query6_pair"],
  "budgets_sec": [0.05],
  "repeat_count": 1,
  "trace_interval_ms": 0,
  "failure_policy": {
    "on_failure": "fail_fast",
    "max_retries": 0
  },
  "output": {
    "root": "bench/results",
    "export_frontier": true,
    "export_trace": true
  }
}
