{
  "config_version": "benchmark_config_v1",
  "mode": "time_capped",
  "description": "Larger repeated NYC anytime benchmark for SOPMOA_relaxed vs LTMOA_parallel on the archived 88959 -> 96072 query.",
  "build_dir": "Release",
  "binary": "./Release/main",
  "build": {
    "enabled": false,
    "command": ["/usr/local/bin/cmake", "--build", "Release", "-j4"]
  },
  "execution": {
    "kind": "per_query"
  },
  "solvers": [
    {
      "name": "SOPMOA_relaxed",
      "thread_counts": [2]
    },
    {
      "name": "LTMOA_parallel",
      "thread_counts": [2]
    }
  ],
  "datasets": ["nyc_3obj"],
  "query_sets": ["nyc_88959_96072"],
  "budgets_sec": [0.5, 1.0, 2.0, 5.0],
  "repeat_count": 5,
  "trace_interval_ms": 0,
  "runtime_control": {
    "timeout_grace_sec": 15.0
  },
  "failure_policy": {
    "mode": "continue_on_error",
    "max_retries": 0
  },
  "output": {
    "root": "bench/results",
    "export_frontier": true,
    "export_trace": true
  }
}
